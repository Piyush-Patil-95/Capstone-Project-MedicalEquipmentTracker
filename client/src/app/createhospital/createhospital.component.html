<!-- Top Navigation Bar -->


<!-- Main Container -->
<div class="container mt-4">

  <!-- Page Title -->
  <h4 class="mb-3">Manage Hospital</h4>

  <!-- Add Hospital Card -->
  <div class="card mb-4">
    <div class="card-header">
      Add Hospital
    </div>

    <div class="card-body">
      <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
        <div class="row align-items-end">

          <!-- Hospital Name -->
          <div class="col-md-4">
            <label class="form-label">Name</label>
            <input placeholder="Hospital Name" type="text" class="form-control" formControlName="name"
              [class.is-invalid]="itemForm.get('name')?.invalid && itemForm.get('name')?.touched">

            <div class="invalid-feedback">
              Hospital name is required
            </div>
          </div>


          <!-- Location -->
          <div class="col-md-4">
            <label class="form-label">Location</label>
            <input placeholder="Location" type="text" class="form-control" formControlName="location"
              [class.is-invalid]="itemForm.get('location')?.invalid && itemForm.get('location')?.touched">

            <div class="invalid-feedback">
              Location is required
            </div>
          </div>

          <!-- Submit Button -->
          <div class="col-md-2">
            <button class="btn btn-outline-secondary w-100" type="submit">
              Submit
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>

  <!-- Hospital Information Table -->
  <div class="card">
    <div class="card-header">
      Hospital Information
    </div>

    <div class="card-body p-0">
      <table class="table table-bordered mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 70px;">Sr#</th>
            <th>Hospital Name</th>
            <th>Location</th>
            <th style="width: 120px;">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let hospital of hospitalList; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ hospital.name }}</td>
            <td>{{ hospital.location }}</td>
            <td>
              <button 
                class="btn btn-sm btn-outline-primary" 
                data-bs-toggle="modal" 
                data-bs-target="#equipmentModal"
                (click)="openModal(hospital)">
                Assign Equipments
              </button>
            </td>
          </tr>

          <tr *ngIf="hospitalList.length === 0">
            <td colspan="4" class="text-center py-3">
              No hospitals available
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="modal fade" id="equipmentModal" tabindex="-1" aria-labelledby="equipmentModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="equipmentModalLabel">Assign Equipment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="equipmentForm">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" formControlName="name" placeholder="Equipment Name">
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" formControlName="description" placeholder="Equipment Description"></textarea>
          </div>
          
          <!-- Success Message shown in 3rd image -->
          <div *ngIf="showMessage" class="alert alert-success mt-2">
            Equipment added successfully
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" (click)="submitEquipment()">Save</button>
      </div>
    </div>
  </div>
</div>
