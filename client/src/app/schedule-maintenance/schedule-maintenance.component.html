<div class="page-wrapper">

  <!-- Background -->
  <div class="bg-blur"></div>
  <div class="bg-blur second"></div>

  <div class="container">

    <!-- TITLE -->
    <div class="top-bar">
      <h2>Scheduled Maintenance</h2>
      <p class="subtitle">Schedule and track equipment maintenance</p>
    </div>

    <!-- FORM CARD -->
    <div class="glass-card">

      <h4>Schedule Equipment Maintenance</h4>

      <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

        <!-- GRID -->
        <div class="form-grid">

          <!-- Hospital -->
          <div class="form-group">
            <label>Hospital</label>
            <select
              formControlName="hospitalId"
              (change)="onHospitalSelect($event)">
              <option value="">Select Hospital</option>
              <option *ngFor="let h of hospitalList" [value]="h.id">
                {{ h.name }}
              </option>
            </select>
          </div>

          <!-- Equipment -->
          <div class="form-group">
            <label>Equipment</label>
            <select formControlName="equipmentId">
              <option value="">Select Equipment</option>
              <option *ngFor="let eq of equipmentList" [value]="eq.id">
                {{ eq.name }}
              </option>
            </select>
          </div>

          <!-- Scheduled Date -->
          <div class="form-group">
            <label>Scheduled Date</label>
            <input
              type="date"
              formControlName="scheduledDate">
          </div>

          <!-- Completed Date -->
          <div class="form-group">
            <label>Completed Date</label>
            <input
              type="date"
              formControlName="completedDate">
          </div>

          <!-- Status -->
          <div class="form-group">
            <label>Status</label>
            <select formControlName="status">
              <option value="">Select Status</option>
              <option>Pending</option>
              <option>In Progress</option>
              <option>Complete</option>
            </select>
          </div>

          <!-- Description (FULL WIDTH like old code intent) -->
          <div class="form-group full">
            <label>Description</label>
            <textarea
              rows="3"
              formControlName="description"
              placeholder="Enter maintenance description">
            </textarea>
          </div>

        </div>

        <!-- BUTTON -->
        <div class="btn-wrap">
          <button type="submit" class="primary-btn">
            Schedule Maintenance
          </button>
        </div>

      </form>

      <!-- SUCCESS -->
      <div *ngIf="showMessage" class="success-msg">
        {{ responseMessage }}
      </div>

      <!-- ERROR -->
      <div *ngIf="showError" class="error-msg">
        {{ errorMessage }}
      </div>

    </div>

  </div>
</div>
