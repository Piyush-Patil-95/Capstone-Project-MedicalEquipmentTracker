<div class="login-container">
<!-- Animated Particles Background -->
<div class="particles-container">
<div class="particle" *ngFor="let p of particles; let i = index" [style.--delay]="i * 0.1 + 's'"></div>
</div>
 
  <div class="login-card">
<!-- Uniform Logo with Rays -->
<div class="logo-section">
<div class="logo-container">
<div class="rays">
<div class="ray ray-1"></div><div class="ray ray-2"></div>
<div class="ray ray-3"></div><div class="ray ray-4"></div>
<div class="ray ray-5"></div><div class="ray ray-6"></div>
<div class="ray ray-7"></div><div class="ray ray-8"></div>
</div>
<div class="logo-circle">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
<path d="M12 5v14M5 12h14"></path>
</svg>
</div>
</div>
<h1>Create Account</h1>
<p class="subtitle">Register to continue</p>
</div>
 
    <!-- Registration Form -->
<form [formGroup]="itemForm" (ngSubmit)="onRegister()">
<!-- Username -->
<div class="input-group">
<input type="text" formControlName="username" id="username" placeholder=" ">
<label for="username">Username</label>
<div class="input-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg>
</div>
</div>
 
      <!-- Email -->
<div class="input-group">
<input type="email" formControlName="email" id="email" placeholder=" ">
<label for="email">Email Address</label>
<div class="input-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"></path><path d="M22 6l-10 7L2 6"></path></svg>
</div>
</div>
 
      <!-- Password with Eye Toggle -->
<div class="input-group">
<input [type]="showPassword ? 'text' : 'password'" formControlName="password" id="password" placeholder=" ">
<label for="password">Password</label>
<div class="input-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
</div>
<button type="button" class="eye-toggle" (click)="togglePassword()">
<svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>
</svg>
<svg *ngIf="showPassword" class="active-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>
</svg>
</button>
</div>
 
      <!-- Role Select -->
<div class="input-group">
<select formControlName="role" id="role">
<option value="" disabled selected hidden></option>
<option *ngFor="let r of roles" [value]="r">{{ r }}</option>
</select>
<label for="role">Select Role</label>
<div class="input-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
</div>
</div>
 
      <button type="submit" class="login-btn">Register</button>
</form>
 
    <p class="footer-text">
      Already have an account? <a (click)="goToLogin()">Login here</a>
</p>
</div>
</div>
