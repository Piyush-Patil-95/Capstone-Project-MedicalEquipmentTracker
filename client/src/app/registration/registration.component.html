<div class="page-wrapper">
  <div class="login-card">
    <div class="top-accent-bar"></div>

    <div class="content">
      <h1>MEDICAL EQUIPMENT & TRACKING SYSTEM</h1>
      <p class="subtitle">Please enter your details here</p>

      <form [formGroup]="itemForm" (ngSubmit)="onRegister()">
        
        <!-- Username -->
        <div class="form-group">
          <label>Username</label>
          <input type="text" formControlName="username" placeholder="Username"
            [class.input-error]="itemForm.get('username')?.invalid && itemForm.get('username')?.touched">
        </div>

        <!-- Email address -->
        <div class="form-group">
          <label>Email address</label>
          <input type="email" formControlName="email" placeholder="name@example.com"
            [class.input-error]="itemForm.get('email')?.invalid && itemForm.get('email')?.touched">
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="*******"
            [class.input-error]="itemForm.get('password')?.invalid && itemForm.get('password')?.touched">
        </div>

        <!-- Role Dropdown -->
        <div class="form-group">
          <label>Role</label>
          <select formControlName="role" [class.input-error]="itemForm.get('role')?.invalid && itemForm.get('role')?.touched">
            <option [ngValue]="null" disabled>Choose Role</option>
            <option *ngFor="let r of roles" [value]="r">{{r}}</option>
          </select>
          <small class="error-text" *ngIf="itemForm.get('role')?.invalid && itemForm.get('role')?.touched">
            Please choose role.
          </small>
        </div>

        <!-- Feedback Message -->
        <div class="response-msg" *ngIf="showMessage" [ngStyle]="{'color': responseMessage.includes('Successful') ? 'green' : 'red'}">
          {{ responseMessage }}
        </div>

        <button type="submit" class="login-btn">Submit</button>
      </form>

      <p class="footer-text">
        <a (click)="goToLogin()" style="cursor: pointer;">Go to Login</a>
      </p>
    </div>
  </div>
</div>
