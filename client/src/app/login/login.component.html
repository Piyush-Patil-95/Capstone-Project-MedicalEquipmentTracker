<div class="page-wrapper">
  <!-- Teal gradient background circles -->
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>
  <div class="bg-circle circle-3"></div>

  <!-- Floating medical icons -->
  <div class="floating-icon icon-dna">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="28" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="rgba(255,255,255,0.08)"/>
      <path d="M22 18 Q30 28 22 38 M38 18 Q30 28 38 38" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M22 22 H38 M22 34 H38" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    </svg>
  </div>
  <div class="floating-icon icon-pill">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="28" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="rgba(255,255,255,0.08)"/>
      <rect x="18" y="26" width="24" height="8" rx="4" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" fill="none"/>
      <line x1="30" y1="26" x2="30" y2="34" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    </svg>
  </div>
  <div class="floating-icon icon-clipboard">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="28" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="rgba(255,255,255,0.08)"/>
      <rect x="20" y="17" width="20" height="26" rx="3" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" fill="none"/>
      <path d="M25 17 H35 V20 H25 Z" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" fill="none"/>
      <line x1="24" y1="26" x2="36" y2="26" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
      <line x1="24" y1="30" x2="36" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
      <line x1="24" y1="34" x2="30" y2="34" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    </svg>
  </div>

  <!-- Heartbeat line -->
  <div class="heartbeat-container">
    <svg class="heartbeat-svg" viewBox="0 0 800 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="0,30 80,30 110,30 130,8 145,52 160,15 175,42 190,30 250,30 300,30 350,30 400,30 420,30 440,8 455,52 470,15 485,42 500,30 560,30 640,30 720,30 800,30"
        fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Language selector -->
  <div class="lang-selector">
    <span class="flag">🌐</span> En <span class="chevron">▾</span>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <!-- Medical cross logo -->
    <div class="logo-circle">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="13" y="4" width="6" height="24" rx="2" fill="#0FA3B1"/>
        <rect x="4" y="13" width="24" height="6" rx="2" fill="#0FA3B1"/>
      </svg>
    </div>

    <h1>Welcome Back!</h1>

    <form [formGroup]="itemForm" (ngSubmit)="onLogin()">

      <!-- EMAIL / PHONE -->
      <div class="form-group">
        <label>Email or No. Handphone</label>
        <div class="input-wrapper">
          <input type="email" formControlName="username" placeholder="example@gmail.com">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </span>
        </div>
        <small class="error"
          *ngIf="itemForm.get('username')?.touched && itemForm.get('username')?.errors">
          <span *ngIf="itemForm.get('username')?.errors?.['required']">Username is required</span>
          <span *ngIf="itemForm.get('username')?.errors?.['email']">Enter valid email</span>
        </small>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper password-field">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••">
          <button type="button" (click)="togglePassword()" class="eye-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path *ngIf="!showPassword" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle *ngIf="!showPassword" cx="12" cy="12" r="3"/>
              <path *ngIf="showPassword" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line *ngIf="showPassword" x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="forgot-link-row">
          <a class="forgot-link">Forgot Password ?</a>
        </div>
        <small class="error"
          *ngIf="itemForm.get('password')?.touched && itemForm.get('password')?.errors">
          <span *ngIf="itemForm.get('password')?.errors?.['required']">Password is required</span>
        </small>
      </div>

      <!-- CAPTCHA -->
      <div class="form-group">
        <label>Captcha Verification</label>
        <div class="captcha-box">
          <span class="captcha-question">{{ captchaQuestion }}</span>
          <!-- <button type="button" class="captcha-refresh" (click)="refreshCaptcha()" title="Refresh captcha">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button> -->
        </div>
        <div class="input-wrapper">
          <input type="text" formControlName="captchaAnswer" placeholder="Enter answer">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </span>
        </div>
        <small class="error"
          *ngIf="itemForm.get('captchaAnswer')?.touched && itemForm.get('captchaAnswer')?.errors">
          <span *ngIf="itemForm.get('captchaAnswer')?.errors?.['required']">Captcha answer is required</span>
        </small>
      </div>

      <!-- ERROR -->
      <div class="error-msg" *ngIf="showError">{{ errorMessage }}</div>

      <!-- SIGN IN BUTTON -->
      <button type="submit" [disabled]="isLoading" class="login-btn">
        <span *ngIf="!isLoading">SIGN IN</span>
        <div class="loader" *ngIf="isLoading">
          <span></span><span></span><span></span>
        </div>
      </button>
    </form>

    <!-- Divider -->
    <!-- <div class="divider"><span>OR</span></div> -->

        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>

    <p class="footer-text">
      Don't have an account ? <a (click)="registration()">Sign Up</a>
    </p>
  </div>
</div>
