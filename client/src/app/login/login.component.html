<div class="page-wrapper">
<div class="login-card">
<div class="top-accent-bar"></div>

<div class="content">
<h1>MEDICAL EQUIPMENT & TRACKING SYSTEM</h1>
<p class="subtitle">Please enter your user and password!</p>

<form [formGroup]="itemForm" (ngSubmit)="onLogin()">

<div class="form-group">
<label>Username</label>
<input type="email" formControlName="username" placeholder="name@example.com"
 [class.input-error]="itemForm.get('username')?.invalid && itemForm.get('username')?.touched">
<small class="error-text" *ngIf="itemForm.get('username')?.errors?.['required'] && itemForm.get('username')?.touched">
Please Enter username .
</small>
</div>

 <div class="form-group">
<label>Password</label>
<input type="password" formControlName="password" placeholder="*******"
 [class.input-error]="itemForm.get('password')?.invalid && itemForm.get('password')?.touched">
<small class="error-text" *ngIf="itemForm.get('password')?.invalid && itemForm.get('password')?.touched">
Invalid password format.
</small>
</div>

<div class="error-msg" *ngIf="showError">
{{ errorMessage }}
</div>

<button type="submit" class="login-btn">Login</button>
</form>

<p class="footer-text">
Don't have an account? <a (click)="registration()">Registration</a>
</p>
</div>
</div>
</div>
